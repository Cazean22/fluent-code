data_dir = ".fluent-code"

[logging.file]
enabled = true
path = "logs/fluent-code.log"
level = "debug"

[logging.stderr]
enabled = true
level = "warn"

[plugins]
enable_project_plugins = true
enable_global_plugins = true
project_dir = ".fluent-code/plugins"
global_dir = ".fluent-code/plugins"

model_provider = "openai"
model = "gpt-5.4"
# Supported values: none, minimal, low, medium, high, xhigh.
# Values are trimmed and normalized to lowercase during config loading.
model_reasoning_effort = "medium"
system_prompt = "You are a helpful coding assistant."

[model_providers.openai]
base_url = "https://api.openai.com/v1"
wire_api = "responses"
api_key_envs = ["OPENAI_API_KEY"]

[model_providers.openai_compatible]
base_url = "http://localhost:11434/v1"
wire_api = "responses"
api_keys = []

[model_providers.mock]
chunk_delay_ms = 25
